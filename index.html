<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SonyLIV Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: black;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .menu a {
            margin: 0 15px;
            text-decoration: none;
            color: white;
        }

        .menu a:hover {
            color: #ffd700;
        }

        /* Banner */
        .banner {
            height: 400px;
            background: url('https://via.placeholder.com/1200x400') no-repeat center/cover;
            display: flex;
            align-items: center;
            padding-left: 50px;
        }

        .banner-text {
            max-width: 400px;
        }

        .banner h1 {
            font-size: 40px;
        }

        .btn {
            padding: 10px 20px;
            background-color: #ffd700;
            color: black;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Content Row */
        .row {
            padding: 20px;
        }

        .row h2 {
            margin-bottom: 10px;
        }

        .cards {
            display: flex;
            gap: 15px;
        }

        .card {
            width: 200px;
            height: 120px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">SonyLIV</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">TV Shows</a>
            <a href="#">Movies</a>
            <a href="#">Sports</a>
        </div>
    </div>

    <!-- Banner -->
    <div class="banner">
        <div class="banner-text">
            <h1>Featured Show</h1>
            <p>Watch the latest trending show now!</p>
            <button class="btn">Watch Now</button>
        </div>
    </div>

    <!-- Trending Section -->
    <div class="row">
        <h2>Trending Now</h2>
        <div class="cards">
            <div class="card">Show 1</div>
            <div class="card">Show 2</div>
            <div class="card">Show 3</div>
            <div class="card">Show 4</div>
        </div>
    </div>

    <!-- Movies Section -->
    <div class="row">
        <h2>Popular Movies</h2>
        <div class="cards">
            <div class="card">Movie 1</div>
            <div class="card">Movie 2</div>
            <div class="card">Movie 3</div>
            <div class="card">Movie 4</div>
        </div>
    </div>

</body>
</html>
